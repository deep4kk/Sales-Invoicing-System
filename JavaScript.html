<script>
let currentUser=null,orders=[],invoices=[],customers=[],products=[];
document.addEventListener('DOMContentLoaded',async()=>{await loadUserInfo();await loadDashboard();setupListeners()});
async function loadUserInfo(){try{currentUser=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getCurrentUser()});document.getElementById('userName').textContent=currentUser.name||currentUser.email;document.getElementById('userAvatar').textContent=(currentUser.name||'U').charAt(0).toUpperCase()}catch(e){}}
function setupListeners(){document.querySelectorAll('.nav-item').forEach(b=>{b.addEventListener('click',()=>{if(b.dataset.view)switchView(b.dataset.view)})});document.getElementById('orderForm').addEventListener('submit',handleCreateOrder)}
function switchView(view){document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===view+'View'));document.getElementById('pageTitle').textContent={dashboard:'Dashboard',orders:'Sales Orders',invoices:'Invoices','new-order':'New Order'}[view]||'Dashboard';if(view==='orders')renderOrders();if(view==='invoices')renderInvoices();if(view==='new-order')loadFormData()}
async function loadDashboard(){try{orders=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllOrders()});const revenue=orders.reduce((s,o)=>s+o.total,0);const pending=orders.filter(o=>o.paymentStatus!=='Paid').reduce((s,o)=>s+o.total,0);document.getElementById('statRevenue').textContent='$'+revenue.toLocaleString();document.getElementById('statOrders').textContent=orders.length;document.getElementById('statPending').textContent='$'+pending.toLocaleString();renderRecentOrders(orders.slice(0,5))}catch(e){}}
function renderRecentOrders(oList){const container=document.getElementById('recentOrders');if(!oList.length){container.innerHTML='<p style="text-align:center;color:var(--gray-500);padding:40px">No orders yet</p>';return}container.innerHTML='<h3>Recent Orders</h3>'+oList.map(o=>`<div class="order-card"><div><div class="order-id">${o.orderID}</div><div style="font-size:12px;color:var(--gray-500)">${o.createdAt?new Date(o.createdAt).toLocaleDateString():''}</div></div><div><span class="order-total">$${o.total.toLocaleString()}</span></div><span class="status-badge ${o.status.toLowerCase()}">${o.status}</span></div>`).join('')}
async function renderOrders(){try{orders=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllOrders()});document.getElementById('ordersList').innerHTML=orders.length?orders.map(o=>`<div class="order-card"><div><div class="order-id">${o.orderID}</div><div style="font-size:12px;color:var(--gray-500)">${o.createdAt?new Date(o.createdAt).toLocaleDateString():''}</div></div><div><span class="order-total">$${o.total.toLocaleString()}</span></div><span class="status-badge ${o.status.toLowerCase()}">${o.status}</span></div>`).join(''):'<p style="text-align:center;color:var(--gray-500);padding:40px">No orders yet</p>'}catch(e){showToast('Failed to load orders','error')}}
async function renderInvoices(){try{invoices=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllInvoices()});document.getElementById('invoicesList').innerHTML=invoices.length?invoices.map(i=>`<div class="invoice-card"><div><div class="invoice-number">${i.invoiceNumber}</div><div style="font-size:12px;color:var(--gray-500)">Due: ${i.dueDate?new Date(i.dueDate).toLocaleDateString():''}</div></div><div><span class="invoice-amount">$${i.amount.toLocaleString()}</span></div><span class="status-badge ${i.status.toLowerCase()}">${i.status}</span></div>`).join(''):'<p style="text-align:center;color:var(--gray-500);padding:40px">No invoices yet</p>'}catch(e){showToast('Failed to load invoices','error')}}
async function loadFormData(){try{customers=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllCustomers()});products=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllProducts()});document.getElementById('customerSelect').innerHTML='<option value="">Select customer</option>'+customers.map(c=>`<option value="${c.customerID}">${c.name}</option>`).join('');document.querySelector('.product-select').innerHTML='<option value="">Select product</option>'+products.map(p=>`<option value="${p.productID}" data-price="${p.unitPrice}" data-name="${p.name}">${p.name} - $${p.unitPrice}</option>`).join('')}catch(e){}}
function addOrderLine(){const container=document.getElementById('orderItems');const div=document.createElement('div');div.className='line-item';div.innerHTML=document.querySelector('.product-select').outerHTML.replace('class="product-select"','class="product-select"');const qtyInput=document.createElement('input');qtyInput.type='number';qtyInput.placeholder='Qty';qtyInput.className='item-qty';qtyInput.oninput=calculateOrderTotal;const priceInput=document.createElement('input');priceInput.type='text';priceInput.placeholder='Price';priceInput.className='item-price';priceInput.readOnly=true;const removeBtn=document.createElement('button');removeBtn.type='button';removeBtn.className='btn-remove';removeBtn.innerHTML='&times;';removeBtn.onclick=()=>{div.remove();calculateOrderTotal()};div.appendChild(qtyInput);div.appendChild(priceInput);div.appendChild(removeBtn);container.appendChild(div)}
function removeOrderLine(btn){btn.parentElement.remove();calculateOrderTotal()}
function calculateOrderTotal(){let subtotal=0;document.querySelectorAll('.line-item').forEach(row=>{const select=row.querySelector('.product-select');const qty=parseFloat(row.querySelector('.item-qty').value)||0;const price=parseFloat(select.options[select.selectedIndex]?.dataset.price)||0;row.querySelector('.item-price').value='$'+price.toFixed(2);subtotal+=qty*price});const tax=subtotal*0.1;document.getElementById('orderSubtotal').textContent='$'+subtotal.toFixed(2);document.getElementById('orderTax').textContent='$'+tax.toFixed(2);document.getElementById('orderTotal').textContent='$'+((subtotal+tax)).toFixed(2)}
async function handleCreateOrder(e){e.preventDefault();const customerID=document.getElementById('customerSelect').value;const items=[];document.querySelectorAll('.line-item').forEach(row=>{const select=row.querySelector('.product-select');const productID=select.value;const name=select.options[select.selectedIndex]?.dataset.name||'';const qty=parseFloat(row.querySelector('.item-qty').value)||0;const price=parseFloat(select.options[select.selectedIndex]?.dataset.price)||0;if(productID&&qty&&price)items.push({productID,name,quantity:qty,unitPrice:price})});if(!items.length){showToast('Add at least one item','error');return}try{await new Promise((r,rej)=>{google.script.run.withSuccessHandler(r).withFailureHandler(rej).createSalesOrder(customerID,items)});showToast('Order created!','success');switchView('orders');loadDashboard()}catch(e){showToast(e.message||'Failed to create order','error')}}
function showToast(m,t='success'){const c=document.getElementById('toastContainer');const toast=document.createElement('div');toast.className=`toast ${t}`;toast.innerHTML=`<span>${m}</span>`;c.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300)},3000)}
</script>
